<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Image Categorizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f6fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: -0.01em; }
    header span { font-size: 0.78rem; opacity: 0.55; }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 0;
      min-height: calc(100vh - 52px);
    }

    /* ── Left panel ── */
    .sidebar {
      background: #fff;
      border-right: 1px solid #e5e7eb;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    label.field-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #6b7280;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: #6366f1; }

    .preview-wrap {
      width: 100%;
      aspect-ratio: 1;
      background: #f3f4f6;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #e5e7eb;
    }
    .preview-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .preview-placeholder {
      color: #9ca3af;
      font-size: 0.8rem;
      text-align: center;
      padding: 16px;
      line-height: 1.5;
    }

    button#analyze-btn {
      width: 100%;
      padding: 11px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button#analyze-btn:hover:not(:disabled) { background: #4f46e5; }
    button#analyze-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ── Right panel ── */
    .content {
      padding: 28px 32px;
      overflow-y: auto;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #9ca3af;
      gap: 8px;
      text-align: center;
    }
    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 0.9rem; }

    .spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      flex-direction: column;
      gap: 16px;
    }
    .spin-ring {
      width: 44px; height: 44px;
      border: 4px solid #e5e7eb;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner p { font-size: 0.85rem; color: #6b7280; }

    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 16px 20px;
      color: #991b1b;
      font-size: 0.85rem;
    }
    .error-box strong { display: block; margin-bottom: 4px; }

    /* Results */
    .results { display: flex; flex-direction: column; gap: 20px; }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      overflow: hidden;
    }
    .card-header {
      padding: 12px 18px;
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #374151;
    }
    .card-body { padding: 16px 18px; }

    /* Score bar */
    .score-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .score-row:last-child { margin-bottom: 0; }
    .score-label { font-size: 0.78rem; color: #6b7280; width: 160px; flex-shrink: 0; }
    .bar-wrap {
      flex: 1;
      height: 6px;
      background: #f3f4f6;
      border-radius: 4px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    .bar-fill.green  { background: #22c55e; }
    .bar-fill.yellow { background: #f59e0b; }
    .bar-fill.red    { background: #ef4444; }
    .score-val { font-size: 0.8rem; font-weight: 600; width: 32px; text-align: right; color: #374151; }

    /* Key-value rows */
    .kv-grid {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 8px 12px;
      align-items: baseline;
    }
    .kv-key { font-size: 0.78rem; color: #6b7280; }
    .kv-val { font-size: 0.83rem; color: #111827; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge.yes { background: #dcfce7; color: #166534; }
    .badge.no  { background: #f3f4f6; color: #9ca3af; }
    .badge.risk-low    { background: #dcfce7; color: #166534; }
    .badge.risk-medium { background: #fef9c3; color: #92400e; }
    .badge.risk-high   { background: #fee2e2; color: #991b1b; }
    .badge.hierarchy   { background: #ede9fe; color: #5b21b6; }

    .notes-text {
      font-size: 0.84rem;
      color: #374151;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
  </svg>
  <h1>Product Image Categorizer</h1>
  <span>Vision API + Gemini</span>
</header>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div>
      <label class="field-label" for="url-input">Image URL</label>
      <input type="text" id="url-input" placeholder="https://example.com/product.jpg" />
    </div>

    <div class="preview-wrap" id="preview-wrap">
      <div class="preview-placeholder" id="preview-placeholder">
        Image preview will appear here
      </div>
      <img id="preview-img" style="display:none" alt="Product preview" />
    </div>

    <button id="analyze-btn">Analyze</button>
  </div>

  <!-- Main content -->
  <div class="content" id="content">
    <div class="empty-state" id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p>Enter an image URL and click Analyze</p>
    </div>
    <div class="spinner" id="spinner" style="display:none">
      <div class="spin-ring"></div>
      <p>Analyzing image…</p>
    </div>
    <div id="error-box" style="display:none"></div>
    <div class="results" id="results" style="display:none"></div>
  </div>
</div>

<script>
  const urlInput   = document.getElementById('url-input');
  const previewImg = document.getElementById('preview-img');
  const previewPh  = document.getElementById('preview-placeholder');
  const analyzeBtn = document.getElementById('analyze-btn');
  const emptyState = document.getElementById('empty-state');
  const spinner    = document.getElementById('spinner');
  const errorBox   = document.getElementById('error-box');
  const results    = document.getElementById('results');

  // Live image preview
  let previewTimer;
  urlInput.addEventListener('input', () => {
    clearTimeout(previewTimer);
    previewTimer = setTimeout(() => {
      const url = urlInput.value.trim();
      if (!url) { showPlaceholder(); return; }
      previewImg.onload  = () => { previewPh.style.display = 'none'; previewImg.style.display = ''; };
      previewImg.onerror = () => { showPlaceholder(); };
      previewImg.src = url;
    }, 400);
  });

  function showPlaceholder() {
    previewImg.style.display = 'none';
    previewPh.style.display  = '';
  }

  // Analyze
  analyzeBtn.addEventListener('click', analyze);
  urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') analyze(); });

  async function analyze() {
    const url  = urlInput.value.trim();
    if (!url) { urlInput.focus(); return; }

    setState('loading');
    try {
      const resp = await fetch('/invoke', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ parameters: { image_url: url } }),
      });
      const json = await resp.json();

      if (!resp.ok || !json.success) {
        const msg = json.error || json.detail || `HTTP ${resp.status}`;
        setState('error', msg);
        return;
      }

      // ZenML wraps pipeline output in: { outputs: { <step_output_name>: value } }
      const data = json.outputs?.output ?? json.outputs?.[Object.keys(json.outputs)[0]] ?? json;
      if (data?.analysis_error) {
        setState('error', data.analysis_error);
        return;
      }
      renderResults(data, url);
      setState('results');
    } catch (err) {
      setState('error', err.message);
    }
  }

  function setState(state, payload) {
    emptyState.style.display = 'none';
    spinner.style.display    = 'none';
    errorBox.style.display   = 'none';
    results.style.display    = 'none';
    analyzeBtn.disabled      = false;

    if (state === 'loading') {
      spinner.style.display = 'flex';
      analyzeBtn.disabled   = true;
    } else if (state === 'error') {
      errorBox.innerHTML = `<strong>Analysis failed</strong>${escHtml(payload)}`;
      errorBox.className = 'error-box';
      errorBox.style.display = 'block';
    } else if (state === 'results') {
      results.style.display = 'flex';
    } else {
      emptyState.style.display = 'flex';
    }
  }

  // ── Render ──────────────────────────────────────────────────────────────── //

  function renderResults(d, url) {
    results.innerHTML = '';

    // Visual Quality
    results.appendChild(card('Visual Quality', visualCard(d)));

    // Anchoring
    results.appendChild(card('Anchoring & Pricing', anchoringCard(d)));

    // Rubric
    results.appendChild(card('Scoring Rubric', rubricCard()));

    // Notes
    if (d.img_overall_notes) {
      const n = document.createElement('div');
      n.className = 'card';
      n.innerHTML = `
        <div class="card-header">Notes</div>
        <div class="card-body">
          <p class="notes-text">${escHtml(d.img_overall_notes)}</p>
        </div>`;
      results.appendChild(n);
    }
  }

  function card(title, bodyEl) {
    const c = document.createElement('div');
    c.className = 'card';
    const h = document.createElement('div');
    h.className = 'card-header';
    h.textContent = title;
    const b = document.createElement('div');
    b.className = 'card-body';
    b.appendChild(bodyEl);
    c.appendChild(h);
    c.appendChild(b);
    return c;
  }

  function visualCard(d) {
    const wrap = document.createElement('div');

    const scores = [
      ['Overall creative',        d.img_overall_creative_score],
      ['Attention',               d.img_attention_score],
      ['Message clarity',         d.img_message_clarity_score_v2],
      ['Branding',                d.img_branding_score],
      ['Offer strength',          d.img_offer_strength_score],
      ['Product presentation',    d.img_product_presentation_score],
      ['Readability (mobile)',    d.img_text_readability_mobile],
      ['Text contrast vs bg',     d.img_text_contrast_bg],
      ['Text contrast vs product', d.img_text_contrast_product],
      ['Whitespace',              d.img_whitespace_score],
    ];
    scores.forEach(([label, val]) => {
      if (val == null) return;
      wrap.appendChild(scoreBar(label, val));
    });

    // KV extras
    const kv = document.createElement('div');
    kv.className = 'kv-grid';
    kv.style.marginTop = '14px';

    if (d.img_visual_hierarchy) {
      kvRow(kv, 'First element', `<span class="badge hierarchy">${escHtml(d.img_visual_hierarchy)}</span>`);
    }
    if (d.img_product_coverage_pct != null) {
      kvRow(kv, 'Product coverage', `${d.img_product_coverage_pct}%`);
    }
    if (d.img_bg_blend_risk) {
      kvRow(kv, 'BG blend risk', `<span class="badge risk-${d.img_bg_blend_risk}">${d.img_bg_blend_risk}</span>`);
    }
    if (d.img_bg_blend_explanation) {
      kvRow(kv, 'Blend note', escHtml(d.img_bg_blend_explanation));
    }
    if (d.img_crop_recommendation) {
      kvRow(kv, 'Crop recommendation', escHtml(d.img_crop_recommendation));
    }
    if (d.img_logo_detected != null) {
      kvRow(kv, 'Logo detected', boolBadge(d.img_logo_detected, d.img_logo_position));
    }
    if (d.img_multi_view_has_multiple_shots != null) {
      const mv = d.img_multi_view_has_multiple_shots;
      const label = mv ? `Yes (${d.img_multi_view_num_shots} views, ${escHtml(d.img_multi_view_layout_type)})` : 'No';
      kvRow(kv, 'Multi-view of same product', label);
    }

    wrap.appendChild(kv);
    return wrap;
  }

  function anchoringCard(d) {
    const kv = document.createElement('div');
    kv.className = 'kv-grid';

    kvRow(kv, 'Price',            boolBadge(d.img_has_price, d.img_price_text));
    kvRow(kv, 'Discount %',       boolBadge(d.img_has_discount_pct, d.img_discount_pct_text));
    kvRow(kv, 'Before/after price', boolBadge(d.img_has_before_after_price));
    kvRow(kv, 'Coupon',           boolBadge(d.img_has_coupon, d.img_coupon_text));

    if (d.img_language_clarity_score != null) {
      const bar = scoreBar('Language clarity', d.img_language_clarity_score);
      bar.style.margin = '12px 0 4px';
      kv.appendChild(document.createElement('div')); // grid filler
      const wrap = document.createElement('div');
      wrap.appendChild(bar);
      if (d.img_language_clarity_issues) {
        const p = document.createElement('p');
        p.style.cssText = 'font-size:0.78rem;color:#6b7280;margin-top:4px;';
        p.textContent = d.img_language_clarity_issues;
        wrap.appendChild(p);
      }
      kv.appendChild(wrap);
    }

    if (d.img_product_type) kvRow(kv, 'Product type', escHtml(d.img_product_type));
    if (d.img_seasonality)  kvRow(kv, 'Seasonality',  escHtml(d.img_seasonality));
    if (d.img_target_gender) kvRow(kv, 'Target gender', escHtml(d.img_target_gender));
    if (d.img_product_name) {
      const ok = d.img_product_name_ok;
      kvRow(kv, 'Product name',
        `${escHtml(d.img_product_name)} <span class="badge ${ok ? 'yes' : 'no'}">${ok ? 'consistent' : 'inconsistent'}</span>`);
    }

    return kv;
  }

  function rubricCard() {
    const div = document.createElement('div');
    div.className = 'kv-grid';
    const sections = [
      ['Attention', 'Is there a clear focal point and visual hierarchy that guides the eye to the most important element first?'],
      ['Message clarity', 'Can a user understand what is offered in 1–2 seconds on mobile (headline, value, CTA) without reading dense text?'],
      ['Offer strength', 'How clearly and prominently are price, discount and key value props communicated?'],
      ['Branding', 'Is the brand/logo visible, legible and distinctive enough to avoid confusion with competitors?'],
      ['Product presentation', 'Is it obvious what is being sold, are views complementary (multi-view), and is the product shown in a fitting context?'],
      ['Simplicity vs clutter', 'Are there few, well-organized elements with enough whitespace, or many items competing for attention?'],
      ['Emotion & craft', 'Does the creative feel polished and emotionally appropriate for the category and message?'],
    ];
    sections.forEach(([title, desc]) => {
      const k = document.createElement('div');
      k.className = 'kv-key';
      k.textContent = title;
      const v = document.createElement('div');
      v.className = 'kv-val';
      v.textContent = desc;
      div.appendChild(k);
      div.appendChild(v);
    });
    return div;
  }

  // ── Helpers ──────────────────────────────────────────────────────────────── //

  function scoreBar(label, val) {
    const pct   = Math.min(Math.max(val * 100, 0), 100);
    const color = pct >= 60 ? 'green' : pct >= 30 ? 'yellow' : 'red';
    const row   = document.createElement('div');
    row.className = 'score-row';
    row.innerHTML = `
      <span class="score-label">${escHtml(label)}</span>
      <div class="bar-wrap"><div class="bar-fill ${color}" style="width:${pct}%"></div></div>
      <span class="score-val">${val.toFixed(2)}</span>`;
    return row;
  }

  function boolBadge(val, detail) {
    const cls  = val ? 'yes' : 'no';
    const icon = val ? '✓' : '✗';
    const det  = (val && detail) ? ` &nbsp;<span style="font-weight:400;color:#374151">${escHtml(detail)}</span>` : '';
    return `<span class="badge ${cls}">${icon}</span>${det}`;
  }

  function kvRow(parent, key, valHtml) {
    const k = document.createElement('div');
    k.className = 'kv-key';
    k.textContent = key;
    const v = document.createElement('div');
    v.className = 'kv-val';
    v.innerHTML = valHtml;
    parent.appendChild(k);
    parent.appendChild(v);
  }

  function escHtml(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
