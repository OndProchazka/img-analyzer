<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Image Categorizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f6fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: -0.01em; }
    header span { font-size: 0.78rem; opacity: 0.55; }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 0;
      min-height: calc(100vh - 52px);
    }

    /* ── Left panel ── */
    .sidebar {
      background: #fff;
      border-right: 1px solid #e5e7eb;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    label.field-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #6b7280;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: #6366f1; }

    .preview-wrap {
      width: 100%;
      aspect-ratio: 1;
      background: #f3f4f6;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #e5e7eb;
    }
    .preview-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .preview-placeholder {
      color: #9ca3af;
      font-size: 0.8rem;
      text-align: center;
      padding: 16px;
      line-height: 1.5;
    }

    button#analyze-btn {
      width: 100%;
      padding: 11px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button#analyze-btn:hover:not(:disabled) { background: #4f46e5; }
    button#analyze-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ── Right panel ── */
    .content {
      padding: 28px 32px;
      overflow-y: auto;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #9ca3af;
      gap: 8px;
      text-align: center;
    }
    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 0.9rem; }

    .spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      flex-direction: column;
      gap: 16px;
    }
    .spin-ring {
      width: 44px; height: 44px;
      border: 4px solid #e5e7eb;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner p { font-size: 0.85rem; color: #6b7280; }

    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 16px 20px;
      color: #991b1b;
      font-size: 0.85rem;
    }
    .error-box strong { display: block; margin-bottom: 4px; }

    /* Results */
    .results { display: flex; flex-direction: column; gap: 20px; }

    /* Hero score */
    .hero-score {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 28px 32px;
      display: flex;
      align-items: center;
      gap: 32px;
      color: #fff;
    }
    .hero-dial {
      position: relative;
      width: 100px;
      height: 100px;
      flex-shrink: 0;
    }
    .hero-dial svg { width: 100px; height: 100px; transform: rotate(-90deg); }
    .hero-dial-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .hero-text { flex: 1; }
    .hero-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.5;
      margin-bottom: 4px;
    }
    .hero-improvements-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      opacity: 0.45;
      margin: 14px 0 8px;
    }
    .hero-improvement-list {
      margin: 0;
      padding-left: 16px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .hero-improvement-list li {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.8);
      line-height: 1.45;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      overflow: hidden;
    }
    .card-header {
      padding: 12px 18px;
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #374151;
    }
    .card-body { padding: 16px 18px; }

    /* Score bar */
    .score-block { margin-bottom: 10px; }
    .score-block:last-child { margin-bottom: 0; }
    .score-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2px;
    }
    .score-explain {
      font-size: 0.71rem;
      color: #6b7280;
      font-style: italic;
      padding-left: 170px;
      line-height: 1.4;
      margin-bottom: 2px;
    }
    .score-label {
      font-size: 0.78rem; color: #6b7280; width: 160px; flex-shrink: 0;
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .score-label .info-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #e5e7eb;
      color: #6b7280;
      font-size: 0.6rem;
      font-weight: 700;
      font-style: italic;
      font-family: Georgia, serif;
      flex-shrink: 0;
      cursor: help;
      transition: background 0.15s, color 0.15s;
    }
    .score-label:hover .info-icon {
      background: #6366f1;
      color: #fff;
    }
    .score-label .tooltip {
      visibility: hidden;
      opacity: 0;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 0;
      width: 260px;
      background: #1a1a2e;
      color: #fff;
      font-size: 0.72rem;
      font-style: normal;
      font-weight: 400;
      line-height: 1.45;
      padding: 8px 10px;
      border-radius: 6px;
      z-index: 10;
      pointer-events: none;
      transition: opacity 0.15s;
      cursor: default;
    }
    .score-label .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 16px;
      border: 5px solid transparent;
      border-top-color: #1a1a2e;
    }
    .score-label:hover .tooltip { visibility: visible; opacity: 1; }
    .bar-wrap {
      flex: 1;
      height: 6px;
      background: #f3f4f6;
      border-radius: 4px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    .bar-fill.green  { background: #22c55e; }
    .bar-fill.yellow { background: #f59e0b; }
    .bar-fill.red    { background: #ef4444; }
    .score-val { font-size: 0.8rem; font-weight: 600; width: 32px; text-align: right; color: #374151; }

    /* Key-value rows */
    .kv-grid {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 8px 12px;
      align-items: baseline;
    }
    .kv-key { font-size: 0.78rem; color: #6b7280; }
    .kv-val { font-size: 0.83rem; color: #111827; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge.yes { background: #dcfce7; color: #166534; }
    .badge.no  { background: #f3f4f6; color: #9ca3af; }
    .badge.risk-low    { background: #dcfce7; color: #166534; }
    .badge.risk-medium { background: #fef9c3; color: #92400e; }
    .badge.risk-high   { background: #fee2e2; color: #991b1b; }
    .badge.hierarchy   { background: #ede9fe; color: #5b21b6; }
    .badge.wcag-aaa    { background: #dcfce7; color: #166534; }
    .badge.wcag-aa     { background: #d1fae5; color: #065f46; }
    .badge.wcag-large  { background: #fef9c3; color: #92400e; }
    .badge.wcag-fail   { background: #fee2e2; color: #991b1b; }

  </style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
  </svg>
  <h1>Product Image Categorizer</h1>
  <span>Vision API + Gemini</span>
</header>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div>
      <label class="field-label" for="url-input">Image URL</label>
      <input type="text" id="url-input" placeholder="https://example.com/product.jpg" />
    </div>

    <div class="preview-wrap" id="preview-wrap">
      <div class="preview-placeholder" id="preview-placeholder">
        Image preview will appear here
      </div>
      <img id="preview-img" style="display:none" alt="Product preview" />
    </div>

    <button id="analyze-btn">Analyze</button>
  </div>

  <!-- Main content -->
  <div class="content" id="content">
    <div class="empty-state" id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p>Enter an image URL and click Analyze</p>
    </div>
    <div class="spinner" id="spinner" style="display:none">
      <div class="spin-ring"></div>
      <p>Analyzing image…</p>
    </div>
    <div id="error-box" style="display:none"></div>
    <div class="results" id="results" style="display:none"></div>
  </div>
</div>

<script>
  const urlInput   = document.getElementById('url-input');
  const previewImg = document.getElementById('preview-img');
  const previewPh  = document.getElementById('preview-placeholder');
  const analyzeBtn = document.getElementById('analyze-btn');
  const emptyState = document.getElementById('empty-state');
  const spinner    = document.getElementById('spinner');
  const errorBox   = document.getElementById('error-box');
  const results    = document.getElementById('results');

  // Live image preview
  let previewTimer;
  urlInput.addEventListener('input', () => {
    clearTimeout(previewTimer);
    previewTimer = setTimeout(() => {
      const url = urlInput.value.trim();
      if (!url) { showPlaceholder(); return; }
      previewImg.onload  = () => { previewPh.style.display = 'none'; previewImg.style.display = ''; };
      previewImg.onerror = () => { showPlaceholder(); };
      previewImg.src = url;
    }, 400);
  });

  function showPlaceholder() {
    previewImg.style.display = 'none';
    previewPh.style.display  = '';
  }

  // Analyze
  analyzeBtn.addEventListener('click', analyze);
  urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') analyze(); });

  async function analyze() {
    const url  = urlInput.value.trim();
    if (!url) { urlInput.focus(); return; }

    setState('loading');
    try {
      const resp = await fetch('/invoke', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ parameters: { image_url: url } }),
      });

      if (!resp.ok) {
        const text = await resp.text();
        let msg = `HTTP ${resp.status}`;
        try { const j = JSON.parse(text); msg = j.error || j.detail || msg; } catch {}
        setState('error', msg);
        return;
      }

      const json = await resp.json();

      if (!json.success) {
        const msg = json.error || json.detail || 'Analysis failed';
        setState('error', msg);
        return;
      }

      // ZenML wraps pipeline output in: { outputs: { <step_output_name>: value } }
      const data = json.outputs?.output ?? json.outputs?.[Object.keys(json.outputs)[0]] ?? json;
      if (data?.analysis_error) {
        setState('error', data.analysis_error);
        return;
      }
      renderResults(data, url);
      setState('results');
    } catch (err) {
      setState('error', err.message);
    }
  }

  function setState(state, payload) {
    emptyState.style.display = 'none';
    spinner.style.display    = 'none';
    errorBox.style.display   = 'none';
    results.style.display    = 'none';
    analyzeBtn.disabled      = false;

    if (state === 'loading') {
      spinner.style.display = 'flex';
      analyzeBtn.disabled   = true;
    } else if (state === 'error') {
      errorBox.innerHTML = `<strong>Analysis failed</strong>${escHtml(payload)}`;
      errorBox.className = 'error-box';
      errorBox.style.display = 'block';
    } else if (state === 'results') {
      results.style.display = 'flex';
    } else {
      emptyState.style.display = 'flex';
    }
  }

  // ── Render ──────────────────────────────────────────────────────────────── //

  function renderResults(d, url) {
    results.innerHTML = '';

    // Hero — overall score + improvements
    results.appendChild(heroCard(d));

    // Visual Quality
    results.appendChild(card('Visual Quality', visualCard(d)));

    // Anchoring
    results.appendChild(card('Anchoring & Pricing', anchoringCard(d)));
  }

  function card(title, bodyEl) {
    const c = document.createElement('div');
    c.className = 'card';
    const h = document.createElement('div');
    h.className = 'card-header';
    h.textContent = title;
    const b = document.createElement('div');
    b.className = 'card-body';
    b.appendChild(bodyEl);
    c.appendChild(h);
    c.appendChild(b);
    return c;
  }

  function heroCard(d) {
    const score = d.img_overall_creative_score ?? 0;
    const pct   = Math.round(score * 100);
    const color = pct > 80 ? '#22c55e' : pct > 50 ? '#f59e0b' : '#ef4444';

    // SVG ring: r=44 → circumference ≈ 276.5
    const r = 44, circ = 2 * Math.PI * r;
    const dash = (pct / 100) * circ;

    const improvItems = (d.img_improvements || [])
      .map(s => `<li>${escHtml(s)}</li>`).join('');

    const el = document.createElement('div');
    el.className = 'hero-score';
    el.innerHTML = `
      <div class="hero-dial">
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="${r}" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="8"/>
          <circle cx="50" cy="50" r="${r}" fill="none" stroke="${color}" stroke-width="8"
            stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}"
            stroke-linecap="round"/>
        </svg>
        <div class="hero-dial-num">${pct}</div>
      </div>
      <div class="hero-text">
        <div class="hero-label">Overall Creative Score</div>
        <div style="font-size:0.88rem;opacity:0.65;line-height:1.5;max-width:480px">
          Composite across attention, clarity, branding, offer strength, product presentation, and craft.
        </div>
        ${improvItems ? `
          <div class="hero-improvements-title">Suggested improvements</div>
          <ul class="hero-improvement-list">${improvItems}</ul>` : ''}
      </div>`;
    return el;
  }

  function visualCard(d) {
    const wrap = document.createElement('div');

    const subScores = [
      ['Attention',                d.img_attention_score,                d.img_justification_attention],
      ['Message clarity',          d.img_message_clarity_score_v2,       d.img_justification_message_clarity],
      ['Branding',                 d.img_branding_score,                 d.img_justification_branding],
      ['Offer strength',           d.img_offer_strength_score,           d.img_justification_offer_strength],
      ['Product presentation',     d.img_product_presentation_score,     d.img_justification_product_presentation],
      ['Readability',              d.img_readability_score,              d.img_justification_readability],
      ['Safe zone',                 d.img_safe_zone_score,               d.img_justification_safe_zone],
      ['Text contrast vs bg',      d.img_text_contrast_bg,              d.img_text_contrast_justification, d.img_text_contrast_ratio, d.img_text_contrast_wcag, d.img_text_contrast_ratio_min, d.img_text_contrast_ratio_max],
      ['Whitespace',               d.img_whitespace_score,              d.img_justification_whitespace],
    ];
    subScores.forEach(([label, val, explain, ratio, wcag, ratioMin, ratioMax]) => {
      if (val == null) return;
      wrap.appendChild(scoreBar(label, val, explain, ratio, wcag, ratioMin, ratioMax));
    });

    // KV extras
    const kv = document.createElement('div');
    kv.className = 'kv-grid';
    kv.style.marginTop = '14px';

    if (d.img_ad_format || d.img_dimensions) {
      const parts = [d.img_ad_format, d.img_dimensions].filter(Boolean).join(' · ');
      kvRow(kv, 'Ad format', `<span class="badge hierarchy">${escHtml(parts)}</span>`);
    }
    if (d.img_safe_zone_elements_at_risk && d.img_safe_zone_elements_at_risk.length > 0) {
      kvRow(kv, 'Safe zone risks', d.img_safe_zone_elements_at_risk.map(e => escHtml(e)).join('<br>'));
    }
    if (d.img_visual_hierarchy) {
      kvRow(kv, 'First element', `<span class="badge hierarchy">${escHtml(d.img_visual_hierarchy)}</span>`);
    }
    if (d.img_product_coverage_pct != null) {
      kvRow(kv, 'Product coverage', `${d.img_product_coverage_pct}%`);
    }
    if (d.img_bg_blend_risk) {
      kvRow(kv, 'BG blend risk', `<span class="badge risk-${d.img_bg_blend_risk}">${d.img_bg_blend_risk}</span>`);
    }
    if (d.img_bg_blend_explanation) {
      kvRow(kv, 'Blend note', escHtml(d.img_bg_blend_explanation));
    }
    if (d.img_crop_recommendation) {
      kvRow(kv, 'Crop recommendation', escHtml(d.img_crop_recommendation));
    }
    if (d.img_logo_detected != null) {
      const logoDetail = [d.img_logo_text, d.img_logo_position].filter(Boolean).join(' · ');
      kvRow(kv, 'Advertiser logo', boolBadge(d.img_logo_detected, logoDetail || null));
    }
    if (d.img_logo_contrast_score != null) {
      const wcag = d.img_logo_contrast_wcag;
      const wcagClass = wcag === 'AAA' ? 'wcag-aaa' : wcag === 'AA' ? 'wcag-aa' : wcag === 'AA Large' ? 'wcag-large' : 'wcag-fail';
      const justify = d.img_logo_contrast_justification ? `<br><span style="font-size:0.73rem;color:#6b7280;font-style:italic">${escHtml(d.img_logo_contrast_justification)}</span>` : '';
      kvRow(kv, 'Logo contrast',
        `<span class="badge ${wcagClass}" title="WCAG contrast ratio: ${d.img_logo_contrast_ratio}:1">${wcag}</span>&nbsp; score ${(d.img_logo_contrast_score * 100).toFixed(0)}${justify}`);
    }
    if (d.img_multi_view_has_multiple_shots != null) {
      const mv = d.img_multi_view_has_multiple_shots;
      const label = mv ? `Yes (${d.img_multi_view_num_shots} views, ${escHtml(d.img_multi_view_layout_type)})` : 'No';
      kvRow(kv, 'Multi-view of same product', label);
    }

    wrap.appendChild(kv);
    return wrap;
  }

  function anchoringCard(d) {
    const kv = document.createElement('div');
    kv.className = 'kv-grid';

    kvRow(kv, 'Price',            boolBadge(d.img_has_price, d.img_price_text));
    kvRow(kv, 'Discount %',       boolBadge(d.img_has_discount_pct, d.img_discount_pct_text));
    kvRow(kv, 'Before/after price', boolBadge(d.img_has_before_after_price));
    kvRow(kv, 'Coupon',           boolBadge(d.img_has_coupon, d.img_coupon_text));

    if (d.img_language_clarity_score != null) {
      const bar = scoreBar('Language clarity', d.img_language_clarity_score, d.img_justification_message_clarity);
      bar.style.margin = '12px 0 4px';
      kv.appendChild(document.createElement('div')); // grid filler
      const wrap = document.createElement('div');
      wrap.appendChild(bar);
      if (d.img_language_clarity_issues) {
        const p = document.createElement('p');
        p.style.cssText = 'font-size:0.78rem;color:#6b7280;margin-top:4px;';
        p.textContent = d.img_language_clarity_issues;
        wrap.appendChild(p);
      }
      kv.appendChild(wrap);
    }

    if (d.img_product_type) kvRow(kv, 'Product type', escHtml(d.img_product_type));
    if (d.img_seasonality)  kvRow(kv, 'Seasonality',  escHtml(d.img_seasonality));
    if (d.img_target_gender) kvRow(kv, 'Target gender', escHtml(d.img_target_gender));
    if (d.img_product_name) {
      const ok = d.img_product_name_ok;
      kvRow(kv, 'Product name',
        `${escHtml(d.img_product_name)} <span class="badge ${ok ? 'yes' : 'no'}">${ok ? 'consistent' : 'inconsistent'}</span>`);
    }

    return kv;
  }


  // ── Helpers ──────────────────────────────────────────────────────────────── //

  const SCORE_TOOLTIPS = {
    'Attention':              'Is there a clear focal point and visual hierarchy that guides the eye to the most important element first?',
    'Message clarity':        'Can a user understand what is offered in 1\u20132 seconds on mobile (headline, value prop, CTA) without reading dense text?',
    'Branding':               'Is the brand/logo visible, legible and distinctive enough to avoid confusion with competitors?',
    'Offer strength':         'How clearly and prominently are price, discount and key value props communicated?',
    'Product presentation':   'Is it obvious what is being sold? Are views complementary (multi-view) and shown in a fitting context?',
    'Readability':            'Can all text be comfortably read on a mobile screen? Combines text size, contrast and density.',
    'Safe zone':              'Are critical elements (price, logo, headline) placed within Meta ad safe zones, avoiding UI overlays?',
    'Text contrast vs bg':    'WCAG 2.0 contrast ratio between text and its background. AA (\u22654.5:1) = good, AA Large (\u22653.0:1) = acceptable, Fail (<3.0:1) = poor.',
    'Whitespace':             'Is there enough breathing room between elements, or does the layout feel cramped and cluttered?',
    'Language clarity':       'Is the text grammatically correct, clear and appropriate for the target audience and locale?',
  };

  function scoreBar(label, val, explain, ratio, wcag, ratioMin, ratioMax) {
    const pct   = Math.min(Math.max(val * 100, 0), 100);
    const color = pct > 80 ? 'green' : pct > 50 ? 'yellow' : 'red';
    const wcagClass = wcag === 'AAA' ? 'wcag-aaa' : wcag === 'AA' ? 'wcag-aa' : wcag === 'AA Large' ? 'wcag-large' : wcag === 'Fail' ? 'wcag-fail' : '';
    const rangeHint = (ratioMin != null && ratioMax != null)
      ? `Contrast ratios range from ${ratioMin}:1 to ${ratioMax}:1 (WCAG 2.0)` : '';
    const wcagBadge = wcag ? `<span class="badge ${wcagClass}" title="${rangeHint}">${wcag}</span>` : '';
    const tip = SCORE_TOOLTIPS[label] || '';
    const infoHtml = tip ? `<span class="info-icon">i</span><span class="tooltip">${escHtml(tip)}</span>` : '';
    const block = document.createElement('div');
    block.className = 'score-block';
    block.innerHTML = `
      <div class="score-row">
        <span class="score-label">${escHtml(label)}${infoHtml}</span>
        <div class="bar-wrap"><div class="bar-fill ${color}" style="width:${pct}%"></div></div>
        <span class="score-val">${val.toFixed(2)}</span>
        ${wcagBadge}
      </div>
      ${explain ? `<div class="score-explain">${escHtml(explain)}</div>` : ''}`;
    return block;
  }

  function boolBadge(val, detail) {
    const cls  = val ? 'yes' : 'no';
    const icon = val ? '✓' : '✗';
    const det  = (val && detail) ? ` &nbsp;<span style="font-weight:400;color:#374151">${escHtml(detail)}</span>` : '';
    return `<span class="badge ${cls}">${icon}</span>${det}`;
  }

  function kvRow(parent, key, valHtml) {
    const k = document.createElement('div');
    k.className = 'kv-key';
    k.textContent = key;
    const v = document.createElement('div');
    v.className = 'kv-val';
    v.innerHTML = valHtml;
    parent.appendChild(k);
    parent.appendChild(v);
  }


  function escHtml(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
